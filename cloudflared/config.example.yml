# Cloudflare Tunnel — https://riftbounddev.roan.dev
#
#   /v1/*, /swagger*  →  local API      :3000
#   everything else   →  Expo dev server :8081  (web + Metro)
#
# Already authenticated via ~/.cloudflared/cert.pem (no `cloudflared login` needed).
# Tunnel created with: cloudflared tunnel create riftbound-dev
# DNS: cloudflared tunnel route dns -f <tunnel-id> riftbounddev.roan.dev
#
# Copy this file to config.yml (or use the generated config.yml in this folder).

tunnel: 1084f7e6-5104-4e04-a6f8-906e04fdd344
credentials-file: /var/home/roan/.cloudflared/1084f7e6-5104-4e04-a6f8-906e04fdd344.json

ingress:
  - hostname: riftbounddev.roan.dev
    path: ^/v1
    service: http://127.0.0.1:3000
  - hostname: riftbounddev.roan.dev
    path: ^/swagger
    service: http://127.0.0.1:3000
  - hostname: riftbounddev.roan.dev
    service: http://127.0.0.1:8081
  - service: http_status:404
