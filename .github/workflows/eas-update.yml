name: EAS Update

on:
  push:
    branches:
      - main
    paths:
      - 'apps/mobile/**'
      - 'packages/contracts/**'
      - 'bun.lock'
      - '.github/workflows/eas-update.yml'
  workflow_dispatch:

concurrency:
  group: eas-update-${{ github.ref }}
  cancel-in-progress: true

jobs:
  update:
    name: Publish Expo Update
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/mobile
    steps:
      - name: Check for EXPO_TOKEN
        working-directory: .
        run: |
          if [ -z "${{ secrets.EXPO_TOKEN }}" ]; then
            echo "You must provide an EXPO_TOKEN secret linked to the iroan Expo account (same as manganess)."
            exit 1
          fi

      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Setup EAS
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Install dependencies
        working-directory: .
        run: bun install --frozen-lockfile

      - name: Build contracts
        working-directory: .
        run: bun run --cwd packages/contracts build

      - name: Publish update
        env:
          EXPO_PUBLIC_API_URL: https://riftapi.solace.onl
        run: >
          eas update
          --branch main
          --environment production
          --message "${{ github.sha }}"
          --non-interactive
